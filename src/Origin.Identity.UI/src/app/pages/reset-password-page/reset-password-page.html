<div class="min-h-screen bg-slate-950 text-white flex items-center justify-center px-4">
  <div class="w-full max-w-md rounded-2xl border border-slate-800 bg-slate-900/80 p-8 shadow-2xl">
    <div class="mb-8 text-center">
      <h1 class="text-3xl font-bold tracking-tight">Reset Password</h1>
      <p class="mt-2 text-sm text-slate-400">
        Enter your new password below to complete the password reset.
      </p>
    </div>

    <form class="space-y-5" (ngSubmit)="reset()" #resetPasswordForm="ngForm">
      <div>
        <label for="newPassword" class="mb-2 block text-sm font-medium text-slate-300">
          New Password
        </label>

        <input
          id="newPassword"
          name="newPassword"
          type="password"
          required
          [(ngModel)]="newPassword"
          class="w-full rounded-xl border border-slate-700 bg-slate-950 px-4 py-3 text-sm text-white outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20"
          placeholder="Enter your new password"
        />
      </div>

      @if (successMessage) {
        <div
          class="rounded-xl border border-green-500/30 bg-green-500/10 px-4 py-3 text-sm text-green-300"
        >
          {{ successMessage }}
        </div>
      }

      @if (errorMessage) {
        <div
          class="rounded-xl border border-red-500/30 bg-red-500/10 px-4 py-3 text-sm text-red-300"
        >
          {{ errorMessage }}
        </div>
      }

      <button
        type="submit"
        [disabled]="isLoading() || !resetPasswordForm.form.valid"
        class="flex w-full items-center justify-center rounded-xl bg-blue-600 px-4 py-3 text-sm font-semibold text-white transition hover:bg-blue-500 disabled:cursor-not-allowed disabled:opacity-50"
      >
        @if (isLoading()) {
          <span>Resetting...</span>
        } @else {
          <span>Reset</span>
        }
      </button>
    </form>
  </div>
</div>
